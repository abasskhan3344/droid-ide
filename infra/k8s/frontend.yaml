apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: droid-ide
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/droid-ide/frontend:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: droid-ide
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 5173
