apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: droid-ide
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/droid-ide/backend:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: droid-ide
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
